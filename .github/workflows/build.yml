name: Build opera-proxy packages

on:
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt version'
        required: true
        default: '25.12.0'
      target:
        description: 'Target (e.g., x86/64, ramips/mt7621)'
        required: true
        default: 'x86/64'

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout packages repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential git python3 rsync gawk unzip libncurses-dev wget file zstd

      - name: Download SDK
        run: |
          set -e -x
          if [ "${{ github.event.inputs.openwrt_version }}" = "SNAPSHOT" ]; then
            BASE_URL="https://downloads.openwrt.org/snapshots/targets/${{ github.event.inputs.target }}/"
          else
            BASE_URL="https://downloads.openwrt.org/releases/${{ github.event.inputs.openwrt_version }}/targets/${{ github.event.inputs.target }}/"
          fi
          SDK_URL=$(curl -s "${BASE_URL}" | grep -oP 'href="openwrt-sdk[^"]+\.tar\.(zst|xz)"' | sed -e 's/href="//' -e 's/"$//' | head -n1)
          if [ -z "$SDK_URL" ]; then
            echo "SDK file not found."
            exit 1
          fi
          curl -fsLO "${BASE_URL}${SDK_URL}"
          tar -xf "$(basename "$SDK_URL")"
          rm -f *.tar.zst *.tar.xz
          # Находим распакованную папку и переименовываем её в openwrt
          SDK_DIR=$(ls -d openwrt-sdk-*/ | head -1)
          if [ -z "$SDK_DIR" ]; then
            echo "SDK directory not found"
            exit 1
          fi
          mv "$SDK_DIR" openwrt

      - name: Build package
        run: |
          cp -r opera-proxy openwrt/package/
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          make defconfig
          make package/opera-proxy/compile V=s

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: opera-proxy-${{ github.event.inputs.openwrt_version }}-${{ github.event.inputs.target }}
          path: openwrt/bin/packages/**/opera-proxy*.apk
